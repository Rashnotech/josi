<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Josi Transport and Logistics Nigeria ride, courier, and fleet services."
    />
    <meta name="keywords" content="Josi, Josi Transport and Logistics, Josi Nigeria, ride services, courier services, fleet services" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="theme-color" content="#050505" />
    <title>Josi Transport and Logistics</title>
    <style>
      .initial-loader {
        align-items: center;
        background: linear-gradient(180deg, #fff 0%, #0b0b0b 100%);
        color: #fff;
        display: grid;
        font-family: system-ui, sans-serif;
        gap: 18px;
        inset: 0;
        justify-items: center;
        min-height: 100vh;
        position: fixed;
        z-index: 9999;
      }

      .initial-loader__mark {
        font-size: 34px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .initial-loader__mark span {
        color: #ec111a;
      }

      .initial-loader__ring {
        animation: initial-loader-spin 0.8s linear infinite;
        border: 3px solid rgba(255, 255, 255, 0.22);
        border-top-color: #ec111a;
        border-radius: 999px;
        height: 44px;
        width: 44px;
      }

      @keyframes initial-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader" role="status" aria-live="polite">
        <div class="initial-loader__mark"><img src="/favicon.png" alt="Josi Logo" style="width: 100px; height: auto;" /></div>
        <div class="initial-loader__ring" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
